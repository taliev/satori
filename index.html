<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Satofi — Пространство</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Контейнер на весь экран */
        body {
            min-height: 100vh;
            width: 100%;
            /* Фоновая картинка satofi.png — растянута на весь экран */
            background-image: url('satofi.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* Эффект параллакса, фон зафиксирован */
            
            /* Центрирование контента */
            display: flex;
            align-items: center;
            justify-content: center;
            
            /* Если картинка не загрузится — тёплый резервный цвет */
            background-color: #1a1510;
        }

        /* Полупрозрачная подложка для читаемости текста (не обязательно, но улучшит контраст) 
           Делаем очень лёгкую, чтобы не перекрывать красоту фона */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.25) 100%);
            pointer-events: none; /* чтобы не мешать кликам, если нужны */
            z-index: 1;
        }

        /* Блок с надписью — по центру экрана */
        .hero {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            /* Небольшая тень для самого контейнера — не влияет на контур букв, но создает глубину */
        }

        /* Стиль для h1 — арабский/восточный шрифт, лунный цвет, тёмный контур */
        .lunar-title {
            font-family: 'Scheherazade New', 'Amiri', 'Noto Naskh Arabic', 'Tahoma', 'Segoe UI', 'Traditional Arabic', serif;
            font-size: clamp(3.5rem, 15vw, 8rem);
            font-weight: 700;
            letter-spacing: 0.08em;
            
            /* Лунный цвет: мягкий серебристо-бежевый, напоминающий свет луны */
            color: #F9F3E2;
            text-shadow: 
                /* Тёмный контур для чёткости на любом фоне */
                2px 2px 0 #1E1B16,
                4px 4px 0 #1E1B16,
                -1px -1px 0 #1E1B16,
                1px -1px 0 #1E1B16,
                -1px 1px 0 #1E1B16,
                1px 1px 0 #1E1B16,
                0px 3px 8px rgba(0,0,0,0.5);
            
            /* Дополнительное свечение луны */
            text-shadow: 0 0 2px #1e1b16, 0 0 4px #1e1b16, 2px 2px 6px rgba(0,0,0,0.7);
            
            /* Для большей выразительности: градиент лунного света */
            background: linear-gradient(135deg, #FFF9EF 0%, #FCE9C4 80%);
            background-clip: text;
            -webkit-background-clip: text;
            color: #FFF5E6; /* запасной цвет, если градиент не сработает */
            
            /* Чтобы градиент на тексте сочетался с контуром, используем хитрость: 
               применяем background-clip, но сохраняем тень поверх */
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 0 #1E1B16, 4px 4px 0 rgba(0,0,0,0.4);
        }
        
        /* Альтернативное, более надёжное решение для кроссбраузерности:
           если градиент на тексте не поддерживается, будет просто светлый цвет с тёмной тенью */
        @supports not (background-clip: text) {
            .lunar-title {
                color: #FFFAEC;
                text-shadow: 3px 3px 0 #1a150e, 6px 6px 12px rgba(0,0,0,0.5);
                background: none;
                -webkit-text-fill-color: initial;
            }
        }
        
        /* Дополнительная подпись в восточном стиле для атмосферы (необязательно, но красиво) */
        .sub {
            margin-top: 1.5rem;
            font-family: 'Segoe UI', 'Amiri', 'Georgia', serif;
            font-size: 0.9rem;
            letter-spacing: 3px;
            color: #EFE3CD;
            text-shadow: 1px 1px 2px #1f1b14;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            backdrop-filter: blur(3px);
            font-weight: 400;
        }
        
        /* Адаптивность: на маленьких экранах чуть уменьшаем отступы и подпись */
        @media (max-width: 640px) {
            .sub {
                font-size: 0.7rem;
                letter-spacing: 2px;
                margin-top: 1rem;
            }
            .hero {
                padding: 1rem;
            }
        }
        
        /* Простая анимация для мягкого появления */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .hero {
            animation: fadeInUp 1s ease-out forwards;
        }
    </style>
</head>
<body>
    <!-- Лёгкая затемняющая подложка для лучшего контраста текста, если фон очень светлый -->
    <div class="overlay"></div>
    
    <div class="hero">
        <h1 class="lunar-title">Satofi</h1>
        <!-- Небольшой изящный штрих, который подчёркивает арабско-восточное настроение, но не перегружает -->
        <div class="sub">روح · дух · путь</div>
    </div>
</body>
</html>
